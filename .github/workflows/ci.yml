name: CI

on:
  push:
    branches: [ "master", "main", "develop" ]
  pull_request:
    branches: [ "master", "main" ]

# Cancel in-progress runs when a new workflow with the same group name starts
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Code Quality Checks
  # ============================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Check code formatting (clang-format)
        uses: ahojukka5/clang-format-action@main
        with:
          clang-format-version: '20'
          check-path: '.'
          exclude-regex: '(build|\.cache|extern|third[-_]party|doxygen-awesome-css)'
          fail-on-error: 'false'

      - name: Clean up clang-format artifacts
        run: rm -f failing-files.txt

      - name: Check REUSE compliance
        uses: fsfe/reuse-action@v2

  # ============================================================================
  # Clang-Tidy Static Analysis
  # ============================================================================
  clang-tidy:
    name: Clang-Tidy Analysis
    needs: [code-quality]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang-tidy \
            clang-tools \
            libopenmpi-dev \
            openmpi-bin \
            libfftw3-dev \
            libfftw3-mpi-dev \
            nlohmann-json3-dev

      - name: Cache HeFFTe (clang-tidy)
        id: cache-heffte-tidy
        uses: actions/cache@v4
        with:
          path: ~/opt/heffte/2.4.1-cpu
          key: heffte-2.4.1-cpu-ubuntu-24.04-tidy-clang-tidy

      - name: Build and install HeFFTe (clang-tidy)
        if: steps.cache-heffte-tidy.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          wget -q -O /tmp/v2.4.1.tar.gz https://github.com/icl-utk-edu/heffte/archive/refs/tags/v2.4.1.tar.gz
          tar xzf /tmp/v2.4.1.tar.gz -C /tmp
          cmake -S /tmp/heffte-2.4.1 -B /tmp/heffte-build-tidy \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_INSTALL_PREFIX=$HOME/opt/heffte/2.4.1-cpu \
            -DHeffte_ENABLE_FFTW=ON \
            -DBUILD_SHARED_LIBS=ON
          cmake --build /tmp/heffte-build-tidy -j2
          cmake --install /tmp/heffte-build-tidy
          rm -rf /tmp/heffte-build-tidy /tmp/v2.4.1.tar.gz /tmp/heffte-2.4.1

      - name: Configure (Debug with compile_commands)
        run: |
          cmake -S . -B build-tidy -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_PREFIX_PATH=$HOME/opt/heffte/2.4.1-cpu

      - name: Run clang-tidy
        run: |
          set -euo pipefail
          # Per-file only: Ubuntu's run-clang-tidy is an older script without -source-filter and
          # can otherwise traverse FetchContent TUs under build-tidy/_deps (e.g. Catch2).
          # Skip GPU-only sources: they use #error or HIP/CUDA headers when GPU toolchains
          # are off (CI is CPU-only).
          failed=0
          while IFS= read -r file; do
            clang-tidy -p build-tidy --quiet \
              -header-filter='include/openpfc/.*' \
              "$file" || failed=1
          done < <(find src apps tests -name "*.cpp" \
            ! -name 'test_tungsten_cuda_vtk.cpp' \
            ! -name 'test_tungsten_hip_vtk.cpp' \
            ! -name 'test_tungsten_cpu_vs_cuda.cpp' \
            ! -name 'test_tungsten_cpu_vs_hip.cpp' \
            ! -path 'apps/tungsten/src/cuda/tungsten.cpp' \
            ! -path 'apps/tungsten/src/hip/tungsten.cpp' \
            ! -path 'apps/tungsten/src/verify_gpu_aware_mpi.cpp')
          exit $failed

  # ============================================================================
  # CMake Build Matrix
  # ============================================================================
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }} / ${{ matrix.build_type }}
    needs: [clang-tidy]
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        compiler: [gcc-11, gcc-13]
        build_type: [Debug, Release]
        include:
          # Add specific compiler versions for each
          - compiler: gcc-11
            cc: gcc-11
            cxx: g++-11
          - compiler: gcc-13
            cc: gcc-13
            cxx: g++-13

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ${{ matrix.cc }} \
            ${{ matrix.cxx }} \
            cmake \
            ninja-build \
            libopenmpi-dev \
            openmpi-bin \
            libfftw3-dev \
            libfftw3-mpi-dev \
            nlohmann-json3-dev

      - name: Cache HeFFTe
        id: cache-heffte
        uses: actions/cache@v4
        with:
          path: ~/opt/heffte/2.4.1-cpu
          key: heffte-2.4.1-cpu-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}

      - name: Build and Install HeFFTe
        if: steps.cache-heffte.outputs.cache-hit != 'true'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          set -euo pipefail
          wget -q -O /tmp/v2.4.1.tar.gz https://github.com/icl-utk-edu/heffte/archive/refs/tags/v2.4.1.tar.gz
          tar xzf /tmp/v2.4.1.tar.gz -C /tmp
          cmake -S /tmp/heffte-2.4.1 -B /tmp/heffte-build-openpfc-ci \
            -GNinja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_INSTALL_PREFIX=$HOME/opt/heffte/2.4.1-cpu \
            -DHeffte_ENABLE_FFTW=ON \
            -DBUILD_SHARED_LIBS=ON
          cmake --build /tmp/heffte-build-openpfc-ci -j2
          cmake --install /tmp/heffte-build-openpfc-ci
          rm -rf /tmp/heffte-build-openpfc-ci /tmp/v2.4.1.tar.gz /tmp/heffte-2.4.1

      - name: Configure OpenPFC
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -S . -B build \
            -GNinja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_PREFIX_PATH=$HOME/opt/heffte/2.4.1-cpu \
            -DOpenPFC_BUILD_TESTS=ON \
            -DOpenPFC_BUILD_EXAMPLES=ON \
            -DOpenPFC_BUILD_APPS=ON \
            -DOpenPFC_BUILD_DOCUMENTATION=OFF \
            -DOpenPFC_RUN_MPI_SUITES=ON

      - name: Build OpenPFC
        run: cmake --build build -j2

      - name: Run Tests
        working-directory: build
        run: |
          # Run tests with verbose output on failure
          ctest --output-on-failure -j2 \
            --exclude-regex "benchmark" \
            --timeout 300

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}
          path: build/Testing/Temporary/LastTest.log

  # ============================================================================
  # Status Check (required for merge)
  # ============================================================================
  ci-status:
    name: CI Status
    if: always()
    needs: [code-quality, clang-tidy, build-and-test]
    runs-on: ubuntu-24.04
    steps:
      - name: Check all jobs status
        run: |
          if [[ "${{ needs.code-quality.result }}" != "success" ]]; then
            echo "❌ Code quality checks failed"
            exit 1
          fi
          if [[ "${{ needs.clang-tidy.result }}" != "success" ]]; then
            echo "❌ Clang-tidy failed"
            exit 1
          fi
          if [[ "${{ needs.build-and-test.result }}" != "success" ]]; then
            echo "❌ Build and test failed"
            exit 1
          fi
          echo "✅ All CI checks passed"
