name: Unit Tests

on:
  push:
    branches: [ "master", "main", "develop" ]
  pull_request:
    branches: [ "master", "main" ]

# Cancel in-progress runs when a new workflow with the same group name starts
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Code Quality Checks
  # ============================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Check code formatting (clang-format)
        uses: ahojukka5/clang-format-action@main
        with:
          clang-format-version: '20'
          check-path: '.'
          exclude-regex: '(build|\.cache|extern|third[-_]party|doxygen-awesome-css)'
          fail-on-error: 'false'

      - name: Clean up clang-format artifacts
        run: rm -f failing-files.txt

      - name: Check REUSE compliance
        uses: fsfe/reuse-action@v2

      - name: Kernel layering (no frontend includes)
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep
          bash scripts/check_kernel_no_frontend_includes.sh

  # ============================================================================
  # CMake Build Matrix
  # ============================================================================
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }} / ${{ matrix.build_type }}
    needs: [code-quality]
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        compiler: [gcc-11, gcc-13]
        build_type: [Debug, Release]
        include:
          # Add specific compiler versions for each
          - compiler: gcc-11
            cc: gcc-11
            cxx: g++-11
          - compiler: gcc-13
            cc: gcc-13
            cxx: g++-13

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ${{ matrix.cc }} \
            ${{ matrix.cxx }} \
            cmake \
            ninja-build \
            libopenmpi-dev \
            openmpi-bin \
            libfftw3-dev \
            libfftw3-mpi-dev \
            nlohmann-json3-dev

      - name: Cache HeFFTe
        id: cache-heffte
        uses: actions/cache@v4
        with:
          path: ~/opt/heffte/2.4.1-cpu
          key: heffte-2.4.1-cpu-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}

      - name: Build and Install HeFFTe
        if: steps.cache-heffte.outputs.cache-hit != 'true'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: scripts/install-heffte-ci.sh "${{ matrix.build_type }}" /tmp/heffte-build-openpfc-ci

      - name: Configure OpenPFC
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -S . -B build \
            -GNinja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_PREFIX_PATH=$HOME/opt/heffte/2.4.1-cpu \
            -DOpenPFC_BUILD_TESTS=ON \
            -DOpenPFC_BUILD_EXAMPLES=ON \
            -DOpenPFC_BUILD_APPS=ON \
            -DOpenPFC_BUILD_DOCUMENTATION=OFF \
            -DOpenPFC_RUN_MPI_SUITES=ON \
            -DOpenPFC_MPI_TEST_MAX_WORLD_SIZE=2

      - name: Build OpenPFC
        run: cmake --build build -j2

      - name: Run Tests
        working-directory: build
        run: |
          # Run tests with verbose output on failure
          ctest --output-on-failure -j2 \
            --exclude-regex "benchmark" \
            --timeout 300

      - name: Compile benchmarks
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -S . -B build-benchmarks \
            -GNinja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_PREFIX_PATH=$HOME/opt/heffte/2.4.1-cpu \
            -DOpenPFC_BUILD_TESTS=ON \
            -DOpenPFC_BUILD_BENCHMARKS=ON \
            -DOpenPFC_BUILD_EXAMPLES=OFF \
            -DOpenPFC_BUILD_APPS=OFF \
            -DOpenPFC_BUILD_DOCUMENTATION=OFF \
            -DOpenPFC_ENABLE_CODE_COVERAGE=OFF
          cmake --build build-benchmarks --target openpfc-tests -j2

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}
          path: build/Testing/Temporary/LastTest.log

  # ============================================================================
  # Packaging smoke test (audit 11 / PN): install OpenPFC and build a downstream
  # consumer against it via find_package(OpenPFC). Guards the export set, the
  # OpenPFCConfig transitive dependencies, and the header-only install filter.
  # Validated locally on tohtori; the flow mirrors tests/packaging/consumer.
  # ============================================================================
  packaging-smoke:
    name: Packaging (find_package consumer)
    needs: [code-quality]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13 cmake ninja-build \
            libopenmpi-dev openmpi-bin libfftw3-dev libfftw3-mpi-dev nlohmann-json3-dev

      - name: Cache HeFFTe
        id: cache-heffte
        uses: actions/cache@v4
        with:
          path: ~/opt/heffte/2.4.1-cpu
          key: heffte-2.4.1-cpu-ubuntu-24.04-gcc-13-Release

      - name: Build and Install HeFFTe
        if: steps.cache-heffte.outputs.cache-hit != 'true'
        env: { CC: gcc-13, CXX: g++-13 }
        run: scripts/install-heffte-ci.sh Release /tmp/heffte-build-openpfc-ci

      - name: Configure + build + install OpenPFC
        env: { CC: gcc-13, CXX: g++-13 }
        run: |
          cmake -S . -B build -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=$HOME/opt/heffte/2.4.1-cpu \
            -DCMAKE_INSTALL_PREFIX=$HOME/openpfc-prefix \
            -DOpenPFC_BUILD_TESTS=OFF -DOpenPFC_BUILD_APPS=OFF \
            -DOpenPFC_BUILD_EXAMPLES=OFF -DOpenPFC_BUILD_DOCUMENTATION=OFF
          cmake --build build -j2
          cmake --install build

      - name: Fail if device sources leaked into the install
        run: |
          if find "$HOME/openpfc-prefix/include" \( -name '*.cu' -o -name '*.hip' \) | grep .; then
            echo "::error::device sources leaked into installed include tree"; exit 1
          fi

      - name: Build + run downstream consumer via find_package
        env: { CC: gcc-13, CXX: g++-13 }
        run: |
          cmake -S tests/packaging/consumer -B build-consumer -GNinja \
            -DCMAKE_PREFIX_PATH="$HOME/openpfc-prefix;$HOME/opt/heffte/2.4.1-cpu"
          cmake --build build-consumer -j2
          ./build-consumer/consumer

  # ============================================================================
  # Compile-only GPU jobs (audit 11 / PN). GitHub runners have no GPU, but nvcc
  # / hipcc compile without one, so these catch GPU-path rot between manual
  # cluster builds. NOTE: authored to mirror the CPU job + build.sh; they build a
  # matching-backend HeFFTe and are marked continue-on-error until first
  # validated on GitHub (the authoritative GPU compile check today is
  # `scripts/build.sh --with-cuda|--with-rocm --no-test` on the clusters).
  # ============================================================================
  cuda-compile:
    name: CUDA compile-only (no GPU)
    needs: [code-quality]
    runs-on: ubuntu-24.04
    continue-on-error: true
    container: nvidia/cuda:12.6.0-devel-ubuntu24.04
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y gcc-13 g++-13 cmake ninja-build git \
            libopenmpi-dev openmpi-bin libfftw3-dev libfftw3-mpi-dev nlohmann-json3-dev
      - name: Build HeFFTe (CUDA)
        env: { CC: gcc-13, CXX: g++-13 }
        run: scripts/install-heffte-ci.sh Release /tmp/heffte-cuda --cuda || scripts/install-heffte-ci.sh Release /tmp/heffte-cuda
      - name: Configure + compile (no tests, no run)
        env: { CC: gcc-13, CXX: g++-13 }
        run: |
          cmake -S . -B build-cuda -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=$HOME/opt/heffte/2.4.1-cuda \
            -DOpenPFC_ENABLE_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES=90 \
            -DOpenPFC_BUILD_TESTS=ON -DOpenPFC_BUILD_APPS=ON \
            -DOpenPFC_BUILD_EXAMPLES=OFF -DOpenPFC_BUILD_DOCUMENTATION=OFF
          cmake --build build-cuda -j2

  hip-compile:
    name: HIP compile-only (no GPU)
    needs: [code-quality]
    runs-on: ubuntu-24.04
    continue-on-error: true
    container: rocm/dev-ubuntu-24.04:6.2
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y cmake ninja-build git \
            libopenmpi-dev openmpi-bin libfftw3-dev libfftw3-mpi-dev nlohmann-json3-dev
      - name: Build HeFFTe (ROCm)
        run: scripts/install-heffte-ci.sh Release /tmp/heffte-rocm --rocm || scripts/install-heffte-ci.sh Release /tmp/heffte-rocm
      - name: Configure + compile (no tests, no run)
        run: |
          cmake -S . -B build-hip -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=$HOME/opt/heffte/2.4.1-rocm \
            -DOpenPFC_ENABLE_HIP=ON -DCMAKE_HIP_ARCHITECTURES=gfx90a \
            -DOpenPFC_BUILD_TESTS=ON -DOpenPFC_BUILD_APPS=ON \
            -DOpenPFC_BUILD_EXAMPLES=OFF -DOpenPFC_BUILD_DOCUMENTATION=OFF
          cmake --build build-hip -j2

  # ============================================================================
  # Status Check (required for merge)
  # ============================================================================
  ci-status:
    name: CI Status
    if: always()
    needs: [code-quality, build-and-test, packaging-smoke]
    runs-on: ubuntu-24.04
    steps:
      - name: Check all jobs status
        run: |
          if [[ "${{ needs.code-quality.result }}" != "success" ]]; then
            echo "❌ Code quality checks failed"
            exit 1
          fi
          if [[ "${{ needs.build-and-test.result }}" != "success" ]]; then
            echo "❌ Build and test failed"
            exit 1
          fi
          echo "✅ All CI checks passed"
